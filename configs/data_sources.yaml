provider_priority:
  primary:
    - fred
  optional_fallback:
    - alpha_vantage
    - manual
    - yfinance

alpha_vantage:
  enabled: true
  request_delay_seconds: 3
  retry_delay_seconds: 10
  max_retries: 1
  gold:
    spot_function: "GOLD_SILVER_SPOT"
    history_function: "GOLD_SILVER_HISTORY"
    symbol: "GOLD"
    interval: "daily"

historical_market_assets:
  spy:
    symbol: "SPY"
    name: "SPDR S&P 500 ETF Trust"
    asset_class: "sp500_proxy"
    proxy_for: "S&P 500 exposure"
    provider: "alpha_vantage"
  qqq:
    symbol: "QQQ"
    name: "Invesco QQQ Trust"
    asset_class: "nasdaq100_proxy"
    proxy_for: "Nasdaq 100 exposure"
    provider: "alpha_vantage"
  gld:
    symbol: "GLD"
    name: "SPDR Gold Shares"
    asset_class: "gold_proxy"
    proxy_for: "Gold exposure"
    provider: "alpha_vantage"
  shy:
    symbol: "SHY"
    name: "iShares 1-3 Year Treasury Bond ETF"
    asset_class: "short_bond_proxy"
    proxy_for: "short-term Treasury bond exposure"
    provider: "alpha_vantage"

manual_market_data:
  file: "data/manual/market_data_manual.csv"

required_core_market_keys:
  - sp500
  - nasdaq
  - dgs10
  - fedfunds
  - cpi
  - pce
  - nonfarm
  - usd_cny

important_optional_market_keys:
  - nasdaq100

optional_market_keys:
  - gold

market_symbols:
  nasdaq100:
    symbol: "^NDX"
    name: "NASDAQ 100 Index"
    provider: "yfinance"
  gold:
    symbol: "GC=F"
    name: "Gold Futures"
    provider: "yfinance"
    asset_type: "commodity"
  usd_cny:
    symbol: "CNY=X"
    name: "USD/CNY"
    provider: "yfinance"

fred_series:
  sp500:
    series_id: "SP500"
    name: "S&P 500 Index"
    asset_type: "market_index"
  nasdaq:
    series_id: "NASDAQCOM"
    name: "NASDAQ Composite Index"
    asset_type: "market_index"
  nasdaq100:
    series_id: "NASDAQ100"
    name: "NASDAQ 100 Index"
    asset_type: "market_index"
  dgs10:
    series_id: "DGS10"
    name: "10-Year Treasury Constant Maturity Rate"
    asset_type: "interest_rate"
  fedfunds:
    series_id: "FEDFUNDS"
    name: "Federal Funds Effective Rate"
    asset_type: "policy_rate"
  cpi:
    series_id: "CPIAUCSL"
    name: "Consumer Price Index for All Urban Consumers"
    asset_type: "inflation"
  pce:
    series_id: "PCEPI"
    name: "Personal Consumption Expenditures Price Index"
    asset_type: "inflation"
  nonfarm:
    series_id: "PAYEMS"
    name: "All Employees, Total Nonfarm"
    asset_type: "labor_market"
  usd_cny:
    series_id: "DEXCHUS"
    name: "Chinese Yuan Renminbi to U.S. Dollar Spot Exchange Rate"
    asset_type: "fx"

retired_sources:
  gold:
    fred_series_ids:
      - "GOLDPMGBD228NLBM"
      - "GOLDAMGBD228NLBM"
    notes: "Retired or unavailable FRED gold fixing series; not used by default."

data_quality:
  sp500:
    expected_frequency: "daily"
    max_stale_days: 5
    source_tier: "official_api"
    importance: "required_core"
  nasdaq:
    expected_frequency: "daily"
    max_stale_days: 5
    source_tier: "official_api"
    importance: "required_core"
  nasdaq100:
    expected_frequency: "daily"
    max_stale_days: 5
    source_tier: "official_api"
    importance: "important_optional"
  dgs10:
    expected_frequency: "daily"
    max_stale_days: 5
    source_tier: "official_api"
    importance: "required_core"
  fedfunds:
    expected_frequency: "monthly"
    max_stale_days: 45
    source_tier: "official_api"
    importance: "required_core"
  cpi:
    expected_frequency: "monthly"
    max_stale_days: 45
    source_tier: "official_api"
    importance: "required_core"
  pce:
    expected_frequency: "monthly"
    max_stale_days: 45
    source_tier: "official_api"
    importance: "required_core"
  nonfarm:
    expected_frequency: "monthly"
    max_stale_days: 45
    source_tier: "official_api"
    importance: "required_core"
  usd_cny:
    expected_frequency: "daily"
    max_stale_days: 10
    source_tier: "official_api"
    importance: "required_core"
  gold:
    expected_frequency: "daily"
    max_stale_days: 3
    source_tier: "third_party_api_or_manual_fallback"

  request_delay_seconds: 3
  retry_delay_seconds: 10
  max_retries: 1
  gold:
    spot_function: "GOLD_SILVER_SPOT"
    history_function: "GOLD_SILVER_HISTORY"
    symbol: "GOLD"
    interval: "daily"

historical_market_assets:

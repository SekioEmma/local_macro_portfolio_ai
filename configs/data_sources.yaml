    role: "growth_equity_market"
  dgs10:
    series_id: "DGS10"
    name: "10-Year Treasury Constant Maturity Rate"
    frequency: "daily"
    role: "long_rate"
  fedfunds:
    series_id: "FEDFUNDS"
    name: "Federal Funds Effective Rate"
    frequency: "monthly"

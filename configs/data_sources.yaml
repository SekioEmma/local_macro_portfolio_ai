financial_condition_keys:
  - high_yield_spread
  - vix
  - real_yield_10y
  - breakeven_inflation_10y
  - yield_curve_10y2y
  - valuation_proxy
  - fedwatch_probability

financial_conditions:
  high_yield_spread:
    provider: "fred"
    series_id: "BAMLH0A0HYM2"
    name: "US High Yield Option-Adjusted Spread"
    unit: "percent"
    asset_type: "credit_spread"
    source_tier: "official_or_public_data_api"
    interpretation_hint: "Higher values may indicate rising credit stress."
    risk_relevance: "Helps distinguish valuation pullback from credit stress."
  vix:
    provider: "fred"
    series_id: "VIXCLS"
    name: "CBOE Volatility Index"
    unit: "index"
    asset_type: "volatility"
    source_tier: "official_or_public_data_api"
    interpretation_hint: "Higher values indicate elevated option-implied equity volatility."
    risk_relevance: "Helps assess volatility stress without treating one reading as a trading signal."
  real_yield_10y:
    provider: "fred"
    series_id: "DFII10"
    name: "10-Year Treasury Inflation-Indexed Security Real Yield"
    unit: "percent"
    asset_type: "real_rate"
    source_tier: "official_or_public_data_api"
    interpretation_hint: "Higher real yields can pressure growth valuations and raise gold opportunity cost."
    risk_relevance: "Connects discount-rate pressure to growth equities and gold."
  breakeven_inflation_10y:
    provider: "fred"
    series_id: "T10YIE"
    name: "10-Year Breakeven Inflation Rate"
    unit: "percent"
    asset_type: "inflation_expectation"
    source_tier: "official_or_public_data_api"
    interpretation_hint: "Higher values may indicate firmer market-implied inflation expectations."
    risk_relevance: "Helps separate inflation-pressure risk from pure growth concerns."
  yield_curve_10y2y:
    provider: "fred"
    series_id: "T10Y2Y"
    name: "10-Year Treasury Minus 2-Year Treasury Spread"
    unit: "percentage_points"
    asset_type: "yield_curve"
    source_tier: "official_or_public_data_api"
    interpretation_hint: "Lower or inverted values indicate tighter curve conditions, not a standalone recession call."
    risk_relevance: "Helps frame recession and policy-cycle pressure."
  valuation_proxy:
    provider: "not_available"
    name: "Valuation Proxy"
    unit: null
    source_tier: "not_available"
    interpretation_hint: "Valuation proxy is not available from configured sources."
    risk_relevance: "Prevents the model from inventing PE, forward PE, CAPE, or valuation percentile data."
    unavailable_reason: "No stable configured public API for audited valuation proxy."
  fedwatch_probability:
    provider: "not_available"
    name: "FedWatch Probability"
    unit: null
    source_tier: "not_available"
    interpretation_hint: "FedWatch probability is not available from configured sources."
    risk_relevance: "Prevents the model from inventing market-implied Fed probability data."
    unavailable_reason: "No configured official or stable public API for FedWatch probability."

deepseek_market_data_package:
  treasury_yields:
    nominal_yield_2y:
      provider: "fred"
      series_id: "DGS2"
      name: "2-Year Treasury Constant Maturity Rate"
      unit: "percent"
      source_tier: "official_or_public_data_api"
      interpretation_hint: "Short-end nominal yield proxy for policy-rate pressure."
      risk_relevance: "Helps separate policy-path pressure from long-duration rate pressure."
    nominal_yield_10y:
      provider: "fred"
      series_id: "DGS10"
      name: "10-Year Treasury Constant Maturity Rate"
      unit: "percent"
      source_tier: "official_or_public_data_api"
      interpretation_hint: "FRED daily constant maturity yield; not intraday high."
      risk_relevance: "Long-rate pressure can affect equity valuation, bonds, and gold opportunity cost."
    nominal_yield_30y:
      provider: "fred"
      series_id: "DGS30"
      name: "30-Year Treasury Constant Maturity Rate"
      unit: "percent"
      source_tier: "official_or_public_data_api"
      interpretation_hint: "FRED daily constant maturity yield; not intraday high."
      risk_relevance: "Helps assess long-end rate pressure, term premium, and duration risk."
  inflation_indicators:
    headline_cpi:
      provider: "fred"
      series_id: "CPIAUCSL"
      name: "Consumer Price Index for All Urban Consumers"
      unit: "index"
      frequency: "monthly"
      source_tier: "official_or_public_data_api"
      interpretation_hint: "Monthly CPI index; do not infer surprise versus consensus without expected data."
      risk_relevance: "Consumer-price level context for inflation pressure."
    core_cpi:
      provider: "fred"
      series_id: "CPILFESL"
      name: "Consumer Price Index Less Food and Energy"
      unit: "index"
      frequency: "monthly"
      source_tier: "official_or_public_data_api"
      interpretation_hint: "Monthly core CPI index; do not overread one release."
      risk_relevance: "Core inflation stickiness can affect rate expectations and duration assets."
    headline_pce:
      provider: "fred"
      series_id: "PCEPI"
      name: "Personal Consumption Expenditures Price Index"
      unit: "index"
      frequency: "monthly"
      source_tier: "official_or_public_data_api"
      interpretation_hint: "Monthly PCE price index; do not infer surprise versus consensus."
      risk_relevance: "PCE inflation context for policy-rate pressure."
    core_pce:
      provider: "fred"
      series_id: "PCEPILFE"
      name: "Personal Consumption Expenditures Excluding Food and Energy"
      unit: "index"
      frequency: "monthly"
      source_tier: "official_or_public_data_api"
      interpretation_hint: "Monthly core PCE index; one observation is not a full trend."
      risk_relevance: "Core PCE context for inflation persistence and policy pressure."
    ppi_all_commodities:
      provider: "fred"
      series_id: "PPIACO"
      name: "Producer Price Index by Commodity: All Commodities"
      unit: "index"
      frequency: "monthly"
      source_tier: "official_or_public_data_api"
      interpretation_hint: "PPIACO is all commodities PPI, not final demand PPI."
      risk_relevance: "Upstream price-pressure context; not a consensus-surprise measure."
    ppi_final_demand:
      provider: "research_needed"
      name: "PPI Final Demand"
      unit: "index"
      source_tier: "research_needed"
      interpretation_hint: "PPI final demand series is not configured until the series id is verified."
      risk_relevance: "Prevents the model from treating PPIACO as final demand PPI."
      unavailable_reason: "Series id research needed; do not guess."
  oil_and_energy:
    wti_oil:
      provider: "fred"
      series_id: "DCOILWTICO"
      name: "Crude Oil Prices: West Texas Intermediate"
      unit: "USD per barrel"
      source_tier: "official_or_public_data_api"
      interpretation_hint: "Daily WTI oil price; energy pressure indicator, not a standalone inflation forecast."
      risk_relevance: "Oil price changes can transmit into energy inflation and rate pressure."
    brent_oil:
      provider: "fred"
      series_id: "DCOILBRENTEU"
      name: "Crude Oil Prices: Brent - Europe"
      unit: "USD per barrel"
      source_tier: "official_or_public_data_api"
      interpretation_hint: "Daily Brent oil price; global energy pressure indicator."
      risk_relevance: "Helps assess global energy shocks and inflation pressure."
  unavailable_or_research_needed:
    valuation_proxy:
      status: "not_available"
      name: "Valuation Proxy"
      unavailable_reason: "No configured audited valuation API."
    forward_pe:
      status: "not_available"
      name: "Forward PE"
      unavailable_reason: "No configured audited forward PE source."
    cape:
      status: "research_needed"
      name: "CAPE"
      unavailable_reason: "Research needed before configuring a stable source."
    earnings_revision:
      status: "not_available"
      name: "Earnings Revision"
      unavailable_reason: "No configured audited earnings revision source."
    fedwatch_probability:
      status: "not_available"
      name: "FedWatch Probability"
      unavailable_reason: "No configured stable public API."
    market_breadth:
      status: "research_needed"
      name: "Market Breadth"
      unavailable_reason: "Research needed for a stable auditable source."
    equal_weight_vs_cap_weight:
      status: "research_needed"
      name: "Equal Weight vs Cap Weight"
      unavailable_reason: "Research needed for a stable auditable source."
    mega_cap_concentration:
      status: "research_needed"
      name: "Mega-cap Concentration"
      unavailable_reason: "Research needed for a stable auditable source."
    intraday_treasury_high:
      status: "not_available"
      name: "Intraday Treasury High"
      unavailable_reason: "FRED DGS series provide daily observations, not intraday highs."
    consensus_cpi:
      status: "not_available"
      name: "Consensus CPI"
      unavailable_reason: "No configured consensus estimate source."
    consensus_ppi:
      status: "not_available"
      name: "Consensus PPI"
      unavailable_reason: "No configured consensus estimate source."


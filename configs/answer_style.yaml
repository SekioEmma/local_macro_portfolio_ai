default_style: "standard"

styles:
  standard:
    description: "默认问答。强调事实、边界、组合口径，适合短问题和工具型查询。"
    constraints:
      - 概念解释题不主动接入组合比例、cash reserve、DCA、target allocation、market temperature 或 portfolio snapshot
      - 只有用户明确询问组合、配置或持仓含义时，才接入组合口径

  analyst_memo:
    description: "投研札记式长分析。适合宏观、市场类比、估值、历史周期、组合影响类问题。"
    structure:
      - 核心判断
      - 类比成立的部分
      - 类比不成立的部分
      - 真正风险在哪里
      - 对用户判断的修正
      - 需要观察的信号
      - 对当前组合的含义
      - 最终判断
    constraints:
      - 不编造当前价格、PE、市值、媒体来源
      - 用户要求最新行情、PE、收益率点位、黄金价格或 FedWatch 概率时，必须先说明本地 context 是否提供；未提供则只能做框架分析
      - context 没有的数据必须说明本地数据不足
      - 可以做情景分析，但不能给确定性预测
      - 组合部分只能给观察方向、定投纪律和再平衡框架
      - 保留 current_holdings 快照日期与 freshness
      - 保留 cash reserve 口径
      - 不输出交易指令
      - 涉及地缘、能源、利率和股债金同跌时，先区分普通避险与通胀型冲击
      - 当用户把收益率上行说成债券上涨时，必须纠正收益率与债券价格关系
      - 区分估值压缩与系统性危机，不能仅凭股债同跌断言危机
